databases:
  - name: builder-db
    plan: basic-1gb
    databaseName: builder
    user: builder_user
    region: oregon
    postgresMajorVersion: "16"

services:
  - type: redis
    name: builder-redis
    plan: free
    ipAllowList: []
    region: oregon
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: builder-auth
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn auth_service:app --host 0.0.0.0 --port 10000
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: builder-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: MASTER_KEY
        sync: false
      - key: GMAIL_ADDRESS
        sync: false
      - key: GMAIL_APP_PW
        sync: false

  - type: web
    name: builder-ai
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn ai_service:app --host 0.0.0.0 --port 10000
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: builder-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: builder-redis
          type: redis
          property: connectionString
      - key: INTERNAL_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CONCEPTION_SERVICE_URL
        value: http://builder-conception:10000

  - type: worker
    name: builder-ai-worker
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A ai_worker worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: builder-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: builder-redis
          type: redis
          property: connectionString
      - key: INTERNAL_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROK_API_KEY
        sync: false
      - key: CONCEPTION_SERVICE_URL
        value: http://builder-conception:10000

  - type: web
    name: builder-workshop
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn workshop_service:app --host 0.0.0.0 --port 10000
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: builder-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: builder-redis
          type: redis
          property: connectionString
      - key: INTERNAL_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: worker
    name: builder-workshop-worker
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A workshop_worker worker --loglevel=info --concurrency=1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: builder-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: builder-redis
          type: redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: INTERNAL_API_KEY
        sync: false

  - type: web
    name: builder-billing
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn billing_service:app --host 0.0.0.0 --port 10000
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: builder-db
          property: connectionString
      - key: INTERNAL_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_MASTER
        sync: false
      - key: STRIPE_PAYMENT_URL
        sync: false
      - key: AUTH_SERVICE_URL
        value: http://builder-auth:10000

  - type: web
    name: builder-export
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn export_service:app --host 0.0.0.0 --port 10000
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: builder-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: builder-redis
          type: redis
          property: connectionString
      - key: INTERNAL_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    name: builder-app
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port 10000 --server.address 0.0.0.0
    healthCheckPath: /
    envVars:
      - key: AUTH_SERVICE_URL
        value: http://builder-auth:10000
      - key: AI_SERVICE_URL
        value: http://builder-ai:10000
      - key: WORKSHOP_SERVICE_URL
        value: http://builder-workshop:10000
      - key: EXPORT_SERVICE_URL
        value: http://builder-export:10000
      - key: BILLING_SERVICE_URL
        value: http://builder-billing:10000
      - key: ANALYTICS_SERVICE_URL
        value: http://builder-analytics:10000
      - key: INTERNAL_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_PAYMENT_URL
        sync: false
